<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ghost Whale PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://terminal.jup.ag/main-v2.js"></script>

<style>
  body { background:#050714; color:#e2e8f0; font-family: ui-monospace, monospace; }
  .glass {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
  }
  .feed-item { border-left: 4px solid #00ffa3; padding:10px; margin-bottom:6px; cursor:pointer; }
  .feed-item:hover { background: rgba(255,255,255,0.05); }
  .danger { border-color:#ff3b3b }
  .pump { border-color:#ff9900 }
  .whale { border-color:#00ffa3 }
</style>
</head>

<body>

<div class="max-w-7xl mx-auto p-6 grid lg:grid-cols-4 gap-6">

<!-- LEFT PANEL -->
<div class="lg:col-span-1 space-y-4">

<div class="glass p-4">
  <h3 class="text-green-400 mb-2 font-bold">Wallet Watchlist</h3>
  <form onsubmit="addWallet(event)">
    <input id="walletInput" class="w-full p-2 bg-black/40 rounded mb-2" placeholder="Enter wallet"/>
    <button class="w-full bg-green-400 text-black py-2 rounded">Add</button>
  </form>
  <div id="walletList" class="mt-3 text-sm"></div>
</div>

<div class="glass p-4">
  <h3 class="text-green-400 mb-2 font-bold">Filters</h3>
  <label class="text-xs">Min Score: <span id="scoreVal">0</span></label>
  <input type="range" min="0" max="100" value="0" id="scoreFilter" class="w-full"/>
  
  <div class="mt-2 space-x-2 text-xs">
    <label><input type="checkbox" checked id="fDanger"> Danger</label>
    <label><input type="checkbox" checked id="fPump"> Pump</label>
    <label><input type="checkbox" checked id="fWhale"> Whale</label>
  </div>
</div>

<div class="glass p-4">
  <h3 class="text-green-400 mb-2 font-bold">Leaderboard</h3>
  <div id="leaderboard" class="text-xs"></div>
</div>

</div>

<!-- MAIN -->
<div class="lg:col-span-3">

<div class="flex justify-between mb-3 text-sm">
  <div>Status: <span id="status">Idle</span></div>
  <div>Signals: <span id="count">0</span></div>
  <button onclick="enableNotif()" class="bg-white/10 px-2 rounded">Enable Alerts</button>
</div>

<div id="feed" class="glass p-4 min-h-[300px] mb-6">Waiting...</div>

<div class="glass p-2" style="height:520px;" id="jup"></div>

</div>

</div>

<script>
// ================= CONFIG =================
const API = "YOUR_BACKEND_URL";
const WS_URL = API.replace("https","wss") + "/ws";

// 🔥 REFERRAL (1% FEE)
const REFERRAL_WALLET = "YOUR_REFERRAL_WALLET";

// ================= STATE =================
let wallets = JSON.parse(localStorage.getItem("wallets")||"[]");
let signals = [];
let jupiterReady = false;
let ws;

// ================= WALLET =================
function saveWallets(){ localStorage.setItem("wallets", JSON.stringify(wallets)); }

function renderWallets(){
  const el = document.getElementById("walletList");
  el.innerHTML = wallets.map(w=>`
    <div class="flex justify-between">
      <span>${w.slice(0,6)}...${w.slice(-4)}</span>
      <button onclick="removeWallet('${w}')">❌</button>
    </div>`).join("");
}

function addWallet(e){
  e.preventDefault();
  const v = walletInput.value.trim();
  if(!v) return;
  wallets.push(v);
  walletInput.value="";
  saveWallets(); renderWallets();
}

function removeWallet(w){
  wallets = wallets.filter(x=>x!==w);
  saveWallets(); renderWallets();
}

// ================= FILTER =================
function passFilter(d){
  const min = +scoreFilter.value;
  const levelOK =
    (fDanger.checked && d.level==="danger") ||
    (fPump.checked && d.level==="pump") ||
    (fWhale.checked && d.level==="whale");

  return d.score >= min && levelOK;
}

// ================= NOTIF =================
function enableNotif(){
  Notification.requestPermission();
}
function alertUser(msg){
  if(Notification.permission==="granted"){
    new Notification("🚨 Whale Alert", { body: msg });
  }
  new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}

// ================= FEED RENDER =================
function renderFeed(data){
  const el = feed;

  const filtered = data.filter(passFilter);

  if(filtered.length===0){
    el.innerHTML="No signals...";
    return;
  }

  document.getElementById("count").innerText = filtered.length;

  el.innerHTML = filtered.map(d=>`
    <div class="feed-item ${d.level}"
      onclick="followTrade('${d.tokenMint}')">
      <b>${d.message}</b>
      <div class="text-xs opacity-50">score: ${d.score||0}</div>
    </div>`).join("");

  // leaderboard simple
  const map = {};
  data.forEach(d=>{ map[d.wallet]=(map[d.wallet]||0)+1 });
  leaderboard.innerHTML = Object.entries(map)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,5)
    .map(([w,c])=>`<div>${w.slice(0,6)}... (${c})</div>`).join("");

  // alert danger
  data.forEach(d=>{
    if(d.level==="danger") alertUser(d.message);
  });
}

// ================= WS =================
function connectWS(){
  try {
    ws = new WebSocket(WS_URL);

    ws.onopen = ()=> status.innerText="Realtime";
    ws.onmessage = (e)=>{
      const data = JSON.parse(e.data);
      renderFeed(data);
    };
    ws.onerror = fallback;
    ws.onclose = fallback;

  } catch {
    fallback();
  }
}

// ================= FALLBACK =================
async function fallback(){
  status.innerText="Polling";
  setInterval(async ()=>{
    const res = await fetch(API+"/feed",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ wallets })
    });
    const data = await res.json();
    renderFeed(data);
  },5000);
}

// ================= JUPITER =================
function initJupiter(r=0){
  if(!window.Jupiter){
    if(r>20) return;
    return setTimeout(()=>initJupiter(r+1),500);
  }

  window.Jupiter.init({
    displayMode:"integrated",
    integratedTargetId:"jup",
    endpoint:"https://api.mainnet-beta.solana.com",
    colorScheme:"dark",

    referral:{
      publicKey: REFERRAL_WALLET,
      feeBps:100
    },

    formProps:{
      initialInputMint:"So11111111111111111111111111111111111111112",
      initialOutputMint:"EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
    },

    containerStyles:{ width:"100%", height:"100%" }
  });

  jupiterReady=true;
}

// ================= FOLLOW =================
function followTrade(mint){
  if(!jupiterReady) return;

  window.Jupiter.resume({
    initialInputMint:"So11111111111111111111111111111111111111112",
    initialOutputMint: mint,
    reset:true
  });

  document.getElementById("jup").scrollIntoView({ behavior:"smooth" });
}

// ================= INIT =================
scoreFilter.oninput = ()=> scoreVal.innerText = scoreFilter.value;

renderWallets();
connectWS();
window.addEventListener("load", initJupiter);
</script>

</body>
</html>
