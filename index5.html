<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ghost Whale 👻 | Smart Money Terminal</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Jupiter -->
  <script src="https://terminal.jup.ag/main-v2.js"></script>

  <style>
    body{
      background:#050816;
      color:white;
      font-family:Inter,sans-serif;
      overflow-x:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.08);
    }

    .glow{
      box-shadow:0 0 30px rgba(0,255,170,0.12);
    }

    .grad{
      background:linear-gradient(135deg,#00ffa3,#00c3ff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .feed-item{
      transition:.25s;
      border-left:4px solid #00ffa3;
      cursor:pointer;
    }

    .feed-item:hover{
      transform:translateX(4px);
      background:rgba(255,255,255,.05);
    }

    .danger{
      border-left-color:#ff4d4d;
    }

    .pump{
      border-left-color:#00c3ff;
    }

    .whale{
      border-left-color:#00ffa3;
    }

    .orb{
      position:fixed;
      width:400px;
      height:400px;
      border-radius:9999px;
      filter:blur(120px);
      opacity:.15;
      z-index:-1;
    }

    .orb1{
      background:#00ffa3;
      top:-100px;
      left:-100px;
    }

    .orb2{
      background:#0066ff;
      bottom:-120px;
      right:-100px;
    }

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#00ffa355;
      border-radius:999px;
    }
  </style>
</head>

<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<!-- NAV -->
<header class="w-full px-6 py-5 flex items-center justify-between border-b border-white/5 sticky top-0 z-50 backdrop-blur-xl bg-black/20">

  <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-[#00ffa3]/20 flex items-center justify-center text-[#00ffa3] font-black text-xl">
      👻
    </div>

    <div>
      <h1 class="font-black tracking-wider text-xl grad">
        GHOST WHALE
      </h1>
      <p class="text-[10px] uppercase tracking-[3px] text-white/30">
        Smart Money Intelligence
      </p>
    </div>
  </div>

  <div class="flex items-center gap-3">

    <div class="glass px-4 py-2 rounded-xl text-xs uppercase tracking-widest text-white/50">
      LIVE ENGINE
    </div>

    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>

  </div>

</header>

<!-- HERO -->
<section class="max-w-7xl mx-auto px-6 py-14">

  <div class="grid lg:grid-cols-3 gap-6">

    <!-- LEFT -->
    <div class="space-y-6">

      <!-- WALLET -->
      <div class="glass glow rounded-3xl p-6">

        <div class="flex items-center justify-between mb-5">
          <h2 class="font-bold text-sm uppercase tracking-[3px] text-[#00ffa3]">
            Target Wallets
          </h2>

          <span class="text-[10px] text-white/30">
            SOLANA
          </span>
        </div>

        <textarea
          id="wallets"
          placeholder="Paste wallet address..."
          class="w-full h-36 rounded-2xl bg-black/30 border border-white/10 p-4 text-sm outline-none text-white resize-none"
        ></textarea>

        <div class="grid grid-cols-2 gap-3 mt-4">

          <button
            onclick="startTracking()"
            class="bg-gradient-to-r from-[#00ffa3] to-[#00c3ff] text-black font-black py-3 rounded-2xl"
          >
            START
          </button>

          <button
            onclick="stopTracking()"
            class="glass py-3 rounded-2xl font-bold"
          >
            STOP
          </button>

        </div>

      </div>

      <!-- SCORE -->
      <div class="glass rounded-3xl p-6">

        <div class="flex items-center justify-between mb-4">

          <div>
            <p class="text-xs uppercase tracking-[3px] text-white/30">
              Ghost Score
            </p>

            <h2
              id="scoreLabel"
              class="text-5xl font-black mt-2"
            >
              —
            </h2>
          </div>

          <div class="text-right">
            <p class="text-[10px] text-white/20 uppercase">
              Realtime
            </p>
          </div>

        </div>

        <div class="w-full h-3 bg-white/5 rounded-full overflow-hidden">

          <div
            id="scoreBar"
            class="h-full bg-gradient-to-r from-[#00ffa3] to-[#00c3ff]"
            style="width:0%"
          ></div>

        </div>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="lg:col-span-2">

      <div class="glass glow rounded-3xl p-6 h-full min-h-[650px] flex flex-col">

        <div class="flex items-center justify-between mb-6">

          <div>
            <h2 class="font-black text-xl">
              Live Alpha Feed
            </h2>

            <p class="text-white/30 text-sm">
              Smart money activity detection
            </p>
          </div>

          <div class="text-xs uppercase tracking-[3px] text-white/30">
            AUTO REFRESH
          </div>

        </div>

        <div
          id="feed"
          class="space-y-3 overflow-y-auto flex-1 pr-2"
        >

          <div class="text-center opacity-20 italic pt-24">
            Awaiting signals...
          </div>

        </div>

      </div>

    </div>

  </div>

</section>

<!-- JUPITER -->
<section class="max-w-7xl mx-auto px-6 pb-24">

  <div class="flex items-center gap-4 mb-6">

    <div class="flex-1 h-[1px] bg-white/10"></div>

    <h2 class="grad font-black text-2xl uppercase tracking-tight">
      Instant Follow Trade
    </h2>

    <div class="flex-1 h-[1px] bg-white/10"></div>

  </div>

  <div
    id="integrated-terminal"
    class="rounded-3xl overflow-hidden glass glow min-h-[700px]"
  ></div>

</section>

<script>

const API = "https://node-express-connect--irvansurayuda05.replit.app";

/* ===================================
   🔥 REFERRAL WALLET
=================================== */
const MY_REFERRAL_KEY = "ISI_WALLET_KAMU";

/* ===================================
   STATE
=================================== */
let timer = null;
let jupiterReady = false;

/* ===================================
   START
=================================== */
function startTracking(){

  const wallets = document
    .getElementById("wallets")
    .value
    .split(",")
    .map(w => w.trim())
    .filter(Boolean);

  if(wallets.length === 0){
    alert("Paste wallet dulu");
    return;
  }

  stopTracking();

  loadFeed(wallets);

  timer = setInterval(() => {
    loadFeed(wallets);
  }, 5000);
}

/* ===================================
   STOP
=================================== */
function stopTracking(){
  if(timer){
    clearInterval(timer);
    timer = null;
  }
}

/* ===================================
   LOAD FEED
=================================== */
async function loadFeed(wallets){

  try{

    const res = await fetch(API + "/feed",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({ wallets })
    });

    const data = await res.json();

    renderFeed(data);

  }catch(err){
    console.log(err);
  }
}

/* ===================================
   RENDER FEED
=================================== */
function renderFeed(data){

  const feed = document.getElementById("feed");

  if(!data || data.length === 0){

    feed.innerHTML = `
      <div class="text-center opacity-20 italic pt-24">
        No signals detected...
      </div>
    `;

    return;
  }

  feed.innerHTML = data.map(item => `

    <div
      onclick="followTrade('${item.tokenMint}')"
      class="feed-item ${item.level || 'whale'} rounded-2xl p-5 bg-white/[0.03]"
    >

      <div class="flex items-center justify-between gap-3">

        <div>

          <h3 class="font-bold text-white">
            ${item.message}
          </h3>

          <p class="text-xs text-[#00ffa3] mt-1 uppercase tracking-[2px]">
            Click to follow trade
          </p>

        </div>

        <div class="text-[10px] text-white/20 uppercase">
          ${new Date().toLocaleTimeString()}
        </div>

      </div>

    </div>

  `).join("");

  const score = data[0]?.score || 0;

  document.getElementById("scoreBar").style.width = score + "%";

  const label = document.getElementById("scoreLabel");

  if(score >= 70){
    label.innerHTML = `<span style="color:#ff4d4d">🔥 ${score}</span>`;
  }else if(score >= 40){
    label.innerHTML = `<span style="color:#00c3ff">⚡ ${score}</span>`;
  }else{
    label.innerHTML = `<span style="color:#00ffa3">👀 ${score}</span>`;
  }
}

/* ===================================
   FOLLOW TRADE
=================================== */
function followTrade(mint){

  if(!window.Jupiter || !mint) return;

  window.Jupiter.resume({
    initialInputMint:
      "So11111111111111111111111111111111111111112",

    initialOutputMint: mint
  });

  document
    .getElementById("integrated-terminal")
    .scrollIntoView({
      behavior:"smooth"
    });
}

/* ===================================
   INIT JUPITER
=================================== */
function initJupiter(){

  if(!window.Jupiter){
    setTimeout(initJupiter,1000);
    return;
  }

  window.Jupiter.init({

    displayMode:"integrated",

    integratedTargetId:"integrated-terminal",

    endpoint:"https://api.mainnet-beta.solana.com",

    colorScheme:"dark",

    referral:{
      publicKey: MY_REFERRAL_KEY,
      feeBps:100
    },

    formProps:{

      initialInputMint:
        "So11111111111111111111111111111111111111112",

      initialOutputMint:
        "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v",

      fixedInputMint:true
    },

    containerStyles:{
      borderRadius:"24px",
      width:"100%"
    }

  });

  jupiterReady = true;

  console.log("Jupiter Ready");
}

document.addEventListener(
  "DOMContentLoaded",
  function(){
    setTimeout(initJupiter,1500);
  }
);

</script>

</body>
</html>
