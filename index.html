<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solana Ghost 👻</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background:#050505;
      color:#eaeaea;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      overflow:hidden;
    }

    .bg{
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#00ffb31a,transparent 30%),
      radial-gradient(circle at bottom right,#00b7ff1a,transparent 30%);
      z-index:-1;
    }

    .card{
      width:420px;
      background:#0d0d0d;
      border:1px solid #1f1f1f;
      border-radius:20px;
      padding:28px;
      box-shadow:0 0 30px #00ffb322;
    }

    .title{
      font-size:30px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .subtitle{
      color:#8d8d8d;
      margin-bottom:25px;
      font-size:14px;
    }

    input{
      width:100%;
      background:#121212;
      border:1px solid #242424;
      padding:15px;
      border-radius:12px;
      color:white;
      margin-bottom:18px;
      outline:none;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#00ff99;
      color:black;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
      margin-bottom:25px;
    }

    button:hover{
      transform:scale(1.02);
      background:#4dffb8;
    }

    .result{
      background:#111;
      border:1px solid #1f1f1f;
      border-radius:16px;
      padding:20px;
      display:none;
    }

    .personality{
      font-size:26px;
      font-weight:bold;
      margin-bottom:12px;
      color:#00ff99;
    }

    .score{
      margin-bottom:10px;
      color:#cfcfcf;
    }

    .desc{
      color:#8f8f8f;
      line-height:1.6;
    }

    .footer{
      margin-top:20px;
      font-size:12px;
      color:#5f5f5f;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="bg"></div>

<div class="card">

  <div class="title">SOLANA GHOST 👻</div>
  <div class="subtitle">
    Smart Money Personality Scanner
  </div>

  <input
    type="text"
    id="wallet"
    placeholder="Paste Solana Wallet Address..."
  >

  <button onclick="scanWallet()">
    Scan Wallet
  </button>

  <div class="result" id="result">

    <div class="personality" id="personality">
      👻 SHADOW WHALE
    </div>

    <div class="score" id="score">
      Ghost Score: 92
    </div>

    <div class="desc" id="desc">
      Quiet accumulation detected.
      This wallet enters early before narratives trend on CT.
    </div>

  </div>

  <div class="footer">
    tracking smart money before the timeline notices 👻
  </div>

</div>

<script>

function scanWallet(){

  const personalities = [

    {
      name:"👻 SHADOW WHALE",
      score:92,
      desc:"Quiet accumulation detected. This wallet enters early before narratives trend on CT."
    },

    {
      name:"⚡ FAST SNIPER",
      score:87,
      desc:"Rapid entries detected. High-risk sniper behavior with aggressive rotation."
    },

    {
      name:"🦍 DIAMOND APE",
      score:81,
      desc:"Strong holding conviction. Rarely sells during volatility."
    },

    {
      name:"💀 EXIT FARMER",
      score:69,
      desc:"Frequently exits after fast pumps. Profit-first behavior detected."
    },

    {
      name:"🎰 GAMBLE DEMON",
      score:77,
      desc:"Extreme degen activity. Trades highly volatile meme coins constantly."
    }

  ];

  const random =
    personalities[Math.floor(Math.random() * personalities.length)];

  document.getElementById("result").style.display = "block";

  document.getElementById("personality").innerText =
    random.name;

  document.getElementById("score").innerText =
    "Ghost Score: " + random.score;

  document.getElementById("desc").innerText =
    random.desc;
}

</script>

</body>
</html>
