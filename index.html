<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Ghost 👻</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body {
  background: #020617;
  color: #00ffa3;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

textarea, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

.feed-item {
  margin-top: 10px;
}

.whale { color: #00ffa3; }
.pump { color: #00c3ff; }
.danger { color: red; }
</style>
</head>

<body>

<div class="container">

<h1>👻 SOLANA GHOST</h1>

<div class="card">
<button onclick="connectWallet()">Connect Wallet</button>
<p id="wallet"></p>
</div>

<div class="card">
<textarea id="wallets" placeholder="wallet1,wallet2"></textarea>
<button onclick="startFeed()">Start Feed</button>
<div id="feed"></div>
</div>

</div>

<script>
const API = "http://localhost:3000"
let provider, wallet, loop

async function connectWallet() {
  provider = window.solana
  if (!provider) return alert("Install Phantom")

  const res = await provider.connect()
  wallet = res.publicKey.toString()

  document.getElementById("wallet").innerText = wallet
}

async function startFeed() {
  const wallets = document.getElementById("wallets").value.split(",")

  async function fetchFeed() {
    try {
      document.getElementById("feed").innerHTML = "Loading..."

      const res = await fetch(API + "/feed", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ wallets })
      })

      const data = await res.json()

      document.getElementById("feed").innerHTML =
        data.map(d =>           <div class="feed-item ${d.level}">             ${d.message}             <br/>             <button onclick="buy()">Buy</button>           </div>        ).join("")
    } catch {
      document.getElementById("feed").innerHTML = "Error loading"
    }
  }

  fetchFeed()
  loop = setInterval(fetchFeed, 5000)
}

async function buy() {
  if (!provider) return alert("Connect wallet dulu")

  if (!confirm("Swap 0.01 SOL ke USDC?")) return

  alert("Swap logic jalan (next step bisa kita refine)")
}
</script>

</body>
</html>
