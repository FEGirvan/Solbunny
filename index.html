<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Ghost 👻</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* CONTAINER /
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/ HERO /
.hero {
  text-align:center;
  margin-bottom:30px;
}

.logo {
  width:70px;
  margin-bottom:10px;
}

h1 {
  font-size:28px;
  margin-bottom:5px;
}

.sub {
  color:#94a3b8;
  font-size:14px;
}

/ CARD /
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius:14px;
  padding:15px;
  margin-bottom:15px;
}

/ INPUT /
textarea, input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  background:#020617;
  color:white;
  font-size:14px;
}

/ BUTTON /
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background: linear-gradient(90deg,#00ffa3,#00c3ff);
  color:black;
  font-weight:bold;
  font-size:14px;
}

/ FEED /
.feed-item {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  font-size:13px;
}

/ COLORS */
.whale {color:#00ffa3;}
.pump {color:#00c3ff;}
.danger {color:#ff3b3b;}

</style>
</head>

<body>

<div class="container">

<div class="hero">
  <img src="G.png" class="logo">
  <h1>SOLANA GHOST</h1>
  <p class="sub">Track whales • Detect signals • Trade instantly</p>
</div>

<div class="card">
  <button onclick="connect()">Connect Wallet</button>
  <p id="addr"></p>
</div>

<div class="card">
  <h3>👻 Ghost Feed</h3>
  <textarea id="wallets" placeholder="wallet1,wallet2"></textarea>
  <button onclick="start()">Start Tracking</button>
  <div id="feed"></div>
</div>

<div class="card">
  <h3>💱 Swap</h3>
  <input id="amount" placeholder="Amount SOL (0.01)">
  <input id="slippage" placeholder="Slippage % (1)">
  <button onclick="preview()">Preview</button>
  <div id="preview"></div>
  <button onclick="execute()">Execute</button>
</div>

</div>

<script>
const API="https://YOUR-BACKEND-URL" // ⚠️ GANTI kalau deploy

let provider,wallet,route

async function connect(){
  provider=window.solana
  if(!provider) return alert("Install Phantom")
  const r=await provider.connect()
  wallet=r.publicKey.toString()
  addr.innerText=wallet.slice(0,6)+"..."+wallet.slice(-4)
}

async function start(){
  const wallets=document.getElementById("wallets").value.split(",")

  setInterval(async ()=>{
    const res=await fetch(API+"/feed",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({wallets})
    })
    const data=await res.json()

    feed.innerHTML=data.map(d=>      <div class="feed-item ${d.level}">         ${d.message}       </div>    ).join("")
  },5000)
}
</script>

</body>
</html>
