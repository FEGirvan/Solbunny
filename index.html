<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Ghost 👻</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #00ffa3;
  font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/* HEADER */
h1 {
  text-align: center;
  font-size: 42px;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 40px;
}

/* CARD */
.card {
  background: rgba(17, 24, 39, 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,255,163,0.2);
  padding: 25px;
  border-radius: 16px;
  margin-bottom: 25px;
  box-shadow: 0 0 30px rgba(0,255,163,0.05);
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #020617;
  color: #00ffa3;
  outline: none;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00ffa3, #00c3ff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/* OUTPUT */
.output {
  margin-top: 15px;
  font-size: 14px;
  line-height: 1.6;
}

/* BADGE */
.signal {
  color: #ff00aa;
  font-weight: bold;
}

/* FOOTER */
.footer {
  text-align: center;
  margin-top: 40px;
  color: #64748b;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<h1>👻 SOLANA GHOST</h1>
<p class="subtitle">
Real-time on-chain intelligence powered by Helius + Jupiter
</p>

<!-- 👻 TRACKER -->
<div class="card">
<h2>Ghost Tracker</h2>
<input id="wallet" placeholder="Enter wallet address..." />
<button onclick="track()">Scan Wallet</button>

<div id="result" class="output"></div>
</div>

<!-- 💱 SWAP -->
<div class="card">
<h2>Swap Quote</h2>
<input id="amount" placeholder="Amount (lamports)" />
<button onclick="getQuote()">Get Quote</button>

<div id="quote" class="output"></div>
</div>

<div class="footer">
👻 Watching the chain. Tracking the unseen.
</div>

</div>

<script>
const API = "http://localhost:3000"

// 👻 TRACK WALLET
async function track() {
  const wallet = document.getElementById("wallet").value

  if (!wallet) {
    alert("Enter wallet first")
    return
  }

  document.getElementById("result").innerHTML = "Scanning..."

  try {
    const res = await fetch(`${API}/ghost/${wallet}`)
    const data = await res.json()

    if (!data.length) {
      document.getElementById("result").innerHTML = "No activity found"
      return
    }

    document.getElementById("result").innerHTML =
      data.map(tx => `
        <div>
          ${tx.type} | ${tx.amount.toFixed(2)} SOL 
          ${tx.signal ? `<span class="signal"> - ${tx.signal}</span>` : ""}
        </div>
      `).join("")

  } catch (err) {
    document.getElementById("result").innerHTML = "Error fetching data"
  }
}

// 💱 QUOTE
async function getQuote() {
  const amount = document.getElementById("amount").value

  if (!amount) {
    alert("Enter amount")
    return
  }

  document.getElementById("quote").innerHTML = "Loading..."

  try {
    const res = await fetch(
      `${API}/quote?input=So11111111111111111111111111111111111111112&output=Es9vMFrzaCERv...&amount=${amount}`
    )

    const data = await res.json()

    document.getElementById("quote").innerHTML =
      `<pre>${JSON.stringify(data, null, 2)}</pre>`

  } catch (err) {
    document.getElementById("quote").innerHTML = "Error fetching quote"
  }
}
</script>

</body>
</html>
