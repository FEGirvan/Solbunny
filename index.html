<<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solana Ghost 👻</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #00ffa3;
  font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER /
.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

/ HEADER /
.header {
  text-align: center;
  margin-bottom: 30px;
}

.logo {
  width: 80px;
  margin-bottom: 10px;
}

h1 {
  font-size: 36px;
}

.subtitle {
  color: #94a3b8;
  margin-top: 5px;
}

/ CARD /
.card {
  background: rgba(17, 24, 39, 0.6);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(0,255,163,0.2);
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 0 30px rgba(0,255,163,0.05);
}

/ INPUT /
textarea {
  width: 100%;
  height: 90px;
  padding: 12px;
  border-radius: 10px;
  background: #020617;
  color: #00ffa3;
  border: none;
  outline: none;
  resize: none;
}

/ BUTTON /
button {
  margin-top: 12px;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #00ffa3, #00c3ff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
}

/ FEED /
.feed-item {
  padding: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  animation: fadeIn 0.3s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}

/ SIGNAL COLORS /
.whale { color: #00ffa3; }
.pump { color: #00c3ff; }
.danger { color: #ff3b3b; }

/ OUTPUT /
.output {
  margin-top: 15px;
  font-size: 14px;
  line-height: 1.6;
  max-height: 300px;
  overflow-y: auto;
}

/ FOOTER */
.footer {
  text-align: center;
  margin-top: 30px;
  color: #64748b;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="G.png" class="logo" alt="Ghost Logo">
  <h1>SOLANA GHOST 👻</h1>
  <p class="subtitle">Real-time On-chain Intelligence Feed</p>
</div>

<!-- FEED -->
<div class="card">
  <h2>👻 Ghost Feed (Multi Wallet)</h2>

  <textarea id="wallets" placeholder="Masukkan wallet (pisahkan dengan koma)..."></textarea>

  <button onclick="startFeed()">Start Ghost Feed</button>

  <div id="feed" class="output">Belum ada data...</div>
</div>

<div class="footer">
👻 Watching the chain. Tracking the unseen.
</div>

</div>

<script>
const API = "http://localhost:3000"
let feedLoop = null

async function startFeed() {
  const raw = document.getElementById("wallets").value

  if (!raw) {
    alert("Masukkan wallet dulu")
    return
  }

  const wallets = raw.split(",").map(w => w.trim()).filter(w => w)

  if (wallets.length === 0) {
    alert("Wallet tidak valid")
    return
  }

  if (feedLoop) clearInterval(feedLoop)

  async function fetchFeed() {
    try {
      const res = await fetch(${API}/feed, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ wallets })
      })

      const data = await res.json()

      if (!data || data.length === 0) {
        document.getElementById("feed").innerHTML = "No signal yet..."
        return
      }

      document.getElementById("feed").innerHTML =
        data.map(item =>           <div class="feed-item ${item.level}">             ${item.message}           </div>        ).join("")

    } catch (err) {
      document.getElementById("feed").innerHTML = "⚠️ Error loading feed"
    }
  }

  // initial load
  fetchFeed()

  // auto refresh tiap 5 detik
  feedLoop = setInterval(fetchFeed, 5000)
}
</script>

</body>
</html>
