<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Signal 👻</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://terminal.jup.ag/main-v4.js"></script>

<style>
body{background:#020617;color:white;font-family:sans-serif;}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;}
.btn{background:linear-gradient(90deg,#00ffa3,#00c3ff);color:black;font-weight:bold;}
.feed{padding:10px;border-radius:10px;margin-bottom:8px;background:rgba(255,255,255,0.05);}
</style>
</head>

<body class="p-4 max-w-md mx-auto">

<!-- HEADER -->
<div class="flex items-center gap-3 mb-6">
  <img src="G.PNG" class="w-10 h-10 rounded-xl">
  <h1 class="font-bold text-lg">Ghost Signal 👻</h1>
</div>

<!-- INPUT -->
<div class="glass p-4 mb-4">
  <textarea id="wallets" class="w-full p-3 bg-black/40 rounded"
    placeholder="wallet1,wallet2"></textarea>

  <button onclick="start()" class="btn w-full mt-3 py-2 rounded">
    Start Tracking
  </button>
</div>

<!-- SCORE -->
<div class="glass p-4 mb-4">
  <div class="flex justify-between text-sm mb-2">
    <span>Signal Strength</span>
    <span id="scoreText">0</span>
  </div>
  <div class="w-full h-2 bg-gray-800 rounded">
    <div id="bar" class="h-2 bg-green-400 rounded" style="width:0%"></div>
  </div>
</div>

<!-- FEED -->
<div class="glass p-4 mb-4">
  <div id="feed"></div>
</div>

<!-- SWAP -->
<div class="glass p-3">
  <div id="jup"></div>
</div>

<script>

const API = "https://36738a46-2101-429d-85a9-11cb89aced46-00-3o91ocjvheqfp.sisko.replit.dev"

let timer

function start(){
  const wallets = walletsInput().split(",").map(x=>x.trim()).filter(Boolean)
  if(wallets.length===0) return alert("isi wallet")

  clearInterval(timer)

  run(wallets)
  timer = setInterval(()=>run(wallets),5000)
}

function walletsInput(){
  return document.getElementById("wallets").value
}

async function run(wallets){
  try{
    const res = await fetch(API+"/feed",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({wallets})
    })

    const data = await res.json()

    // FEED
    feed.innerHTML = data.map(d=>      <div class="feed">${d.message}</div>    ).join("")

    // SCORE
    const match = (data[0]?.message || "").match(/((\d+))/)
    const score = match ? parseInt(match[1]) : 0

    bar.style.width = score + "%"
    scoreText.innerText = score

  }catch{
    feed.innerHTML="error"
  }
}

// JUPITER
window.onload = () => {
  if(window.Jupiter){
    window.Jupiter.init({
      displayMode:"integrated",
      integratedTargetId:"jup",
      endpoint:"https://api.mainnet-beta.solana.com"
    })
  }
}

</script>

</body>
</html>
