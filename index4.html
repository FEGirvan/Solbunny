<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Whale Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050714; color:#e2e8f0; font-family: monospace; }
.glass {
  background: rgba(15,23,42,0.6);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 16px;
}
.feed-item {
  border-left: 4px solid #00ffa3;
  padding: 10px;
  margin-bottom: 6px;
  cursor: pointer;
}
.danger { border-color:#ff3b3b }
.pump { border-color:#ff9900 }
.whale { border-color:#00ffa3 }
</style>
</head>

<body>

<div class="max-w-6xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-green-400">👻 Ghost Whale Terminal</h1>

<!-- WALLET INPUT -->
<div class="glass p-4 mb-6">
  <form onsubmit="addWallet(event)">
    <input id="walletInput"
      placeholder="Enter wallet address..."
      class="w-full p-3 bg-black/40 rounded mb-3">
    <button class="bg-green-400 text-black px-4 py-2 rounded">Add Wallet</button>
  </form>

  <div id="walletList" class="mt-4 space-y-2"></div>
</div>

<!-- STATUS -->
<div class="flex gap-6 mb-4 text-sm">
  <div>Status: <span id="status">Idle</span></div>
  <div>Signals: <span id="signalCount">0</span></div>
</div>

<!-- FEED -->
<div id="feed" class="glass p-4 min-h-[300px]">
  Waiting for signals...
</div>

</div>

<script>
// ================= CONFIG =================
const API = "https://your-backend.replit.dev"; // GANTI INI

let wallets = [];
let timer = null;
let totalSignals = 0;

// ================= WALLET =================
function renderWallets(){
  const el = document.getElementById("walletList");

  if(wallets.length === 0){
    el.innerHTML = "<div class='text-white/20'>No wallets</div>";
    return;
  }

  el.innerHTML = wallets.map(w => `
    <div class="flex justify-between items-center bg-white/5 p-2 rounded">
      <span>${w.slice(0,6)}...${w.slice(-4)}</span>
      <button onclick="removeWallet('${w}')">❌</button>
    </div>
  `).join("");
}

function addWallet(e){
  e.preventDefault();
  const input = document.getElementById("walletInput");
  const val = input.value.trim();

  if(!val) return;

  wallets.push(val);
  input.value = "";
  renderWallets();
}

function removeWallet(w){
  wallets = wallets.filter(x => x !== w);
  renderWallets();
}

// ================= FEED =================
async function fetchFeed(){
  if(wallets.length === 0) return;

  document.getElementById("status").innerText = "Scanning...";

  try {
    const res = await fetch(API + "/feed", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ wallets })
    });

    const data = await res.json();
    const el = document.getElementById("feed");

    if(!data || data.length === 0){
      el.innerHTML = "No signals...";
      return;
    }

    totalSignals += data.length;
    document.getElementById("signalCount").innerText = totalSignals;

    el.innerHTML = data.map(d => `
      <div class="feed-item ${d.level}">
        <b>${d.message}</b>
      </div>
    `).join("");

  } catch(e){
    console.error(e);
  }

  document.getElementById("status").innerText = "Live";
}

// ================= START =================
function start(){
  if(timer) clearInterval(timer);
  fetchFeed();
  timer = setInterval(fetchFeed, 5000);
}

start();
</script>

</body>
</html>
